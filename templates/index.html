<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0a2b3c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VetScan AI">
    <title>VetScan AI | Clinical Diagnostics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #f1f5f9;
            --surface: #ffffff;
            --card: #ffffff;
            --text: #0f172a;
            --text-light: #475569;
            --border: #e2e8f0;
            --accent: #1e6f5c;
            --accent-light: #2c8c76;
            --accent-bg: #e6f4f0;
            --critical: #dc2626;
            --high: #ea580c;
            --moderate: #ca8a04;
            --normal: #16a34a;
            --shadow: 0 1px 3px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #0f1724;
            --surface: #1e293b;
            --card: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --border: #334155;
            --accent-bg: #1e2a3a;
        }

        body {
            background: var(--bg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 12px;
            min-height: 100vh;
            transition: background 0.2s;
        }

        /* Native app container - centered, narrow */
        .app {
            max-width: 560px;
            margin: 0 auto;
            width: 100%;
        }

        /* Card styling */
        .card {
            background: var(--surface);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 12px;
        }

        /* Header with improved logo */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 4px 8px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #1e6f5c, #0f4a3e);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .logo-icon img {
            width: 32px;
            height: 32px;
            filter: brightness(0) invert(1);
        }

        .logo-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .logo-text span {
            color: var(--accent);
            font-weight: 600;
        }

        /* Small buttons */
        .btn-sm {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 5px 10px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            color: var(--text);
            transition: all 0.15s;
        }

        /* Upload area - compact 16:9 */
        .upload-area {
            cursor: pointer;
            background: var(--bg);
            border-radius: 18px;
            overflow: hidden;
        }

        .preview-box {
            aspect-ratio: 16 / 9;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }

        .placeholder {
            text-align: center;
            color: var(--text-light);
            padding: 10px;
        }

        .placeholder i {
            font-size: 1.5rem;
            margin-bottom: 2px;
            opacity: 0.6;
        }

        .placeholder p {
            font-size: 0.65rem;
            font-weight: 500;
        }

        .placeholder small {
            font-size: 0.55rem;
        }

        .preview-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .preview-img.active { opacity: 1; }

        .camera-feed {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 2;
        }

        .action-bar {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin: 8px 0 10px;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 44px;
            background: var(--surface);
            border: 1px solid var(--border);
            font-size: 1rem;
            cursor: pointer;
            color: var(--text);
            transition: 0.1s;
            box-shadow: var(--shadow);
        }

        .action-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            width: 50px;
            height: 50px;
            margin-top: -3px;
        }

        .camera-actions {
            display: none;
            justify-content: center;
            gap: 10px;
            margin-top: 6px;
            margin-bottom: 6px;
        }

        .results-panel {
            padding: 10px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-light);
        }

        .result-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 8px 10px;
            margin-bottom: 6px;
            transition: 0.1s;
        }

        .result-item.top {
            border-left: 3px solid var(--accent);
            background: var(--accent-bg);
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .disease {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text);
        }

        .disease i { font-size: 0.8rem; width: 18px; color: var(--accent); }

        .confidence {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            font-weight: 600;
            background: var(--bg);
            padding: 2px 6px;
            border-radius: 20px;
        }

        .progress {
            height: 3px;
            background: var(--border);
            border-radius: 3px;
            margin: 5px 0;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 0.5s ease;
            border-radius: 3px;
        }

        .urgency {
            font-size: 0.55rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 6px;
            border-radius: 20px;
            background: var(--bg);
        }

        .desc {
            font-size: 0.6rem;
            color: var(--text-light);
            margin-top: 5px;
            padding-top: 5px;
            border-top: 1px solid var(--border);
            display: none;
        }

        .top .desc { display: flex; gap: 5px; align-items: center; }

        .privacy-note {
            font-size: 0.5rem;
            text-align: center;
            margin: 6px 0 4px;
            color: var(--text-light);
            opacity: 0.7;
        }

        .loader-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border-radius: 18px;
            flex-direction: column;
        }

        .loader-overlay.active { display: flex; }

        .spinner {
            width: 22px;
            height: 22px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .scan-status {
            color: white;
            font-size: 0.6rem;
            margin-top: 5px;
            font-weight: 500;
        }

        .visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; }

        button {
            cursor: pointer;
            background: none;
            border: none;
        }

        .btn-sm:active, .action-btn:active {
            transform: scale(0.96);
            opacity: 0.8;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">
            <div class="logo-icon" id="logoIcon">
                <img id="logoImg" alt="VetScan" src="">
            </div>
            <span class="logo-text">VetScan<span> AI</span></span>
        </div>
        <button class="btn-sm" id="themeToggle"><i class="fas fa-moon"></i> Theme</button>
    </div>

    <!-- Main card: upload zone -->
    <div class="card upload-area" id="uploadZone">
        <div class="preview-box">
            <div class="placeholder" id="placeholder">
                <i class="fas fa-cow"></i>
                <p>Tap or drag image</p>
                <small>JPEG, PNG</small>
            </div>
            <img class="preview-img" id="previewImg" alt="Preview">
            <video id="cameraStream" class="camera-feed" autoplay playsinline muted></video>
            <div id="loaderOverlay" class="loader-overlay">
                <div class="spinner"></div>
                <div id="scanStatus" class="scan-status">Analyzing</div>
            </div>
        </div>
    </div>

    <div class="action-bar">
        <button class="action-btn" id="galleryBtn"><i class="fas fa-images"></i></button>
        <button class="action-btn primary" id="cameraBtn"><i class="fas fa-camera"></i></button>
        <button class="action-btn" id="clearBtn"><i class="fas fa-trash-alt"></i></button>
    </div>
    <div id="cameraControls" class="camera-actions">
        <button class="btn-sm" id="captureBtn"><i class="fas fa-camera-retro"></i> Capture</button>
        <button class="btn-sm" id="closeCamBtn"><i class="fas fa-times"></i> Cancel</button>
    </div>

    <!-- Results card -->
    <div class="card">
        <div class="results-panel">
            <div class="panel-header">
                <span><i class="fas fa-stethoscope"></i> Clinical Report</span>
                <button class="btn-sm" id="pdfBtn" style="padding: 3px 8px;"><i class="fas fa-file-pdf"></i> PDF</button>
            </div>
            <div id="resultsList"></div>
        </div>
    </div>

    <div class="privacy-note">
        <i class="fas fa-shield-alt"></i> No data storage · Ephemeral analysis
    </div>
</div>

<input type="file" id="fileInput" accept="image/jpeg,image/png" class="visually-hidden">
<canvas id="captureCanvas" style="display:none;"></canvas>

<script>
    // ---------- CLINICAL DATA ----------
    const DISEASE_DB = {
        'FMD': { name: 'Foot-and-Mouth Disease', icon: 'fa-virus', urgency: 'CRITICAL', color: '#dc2626', desc: 'Highly contagious. Immediate isolation & veterinary notification.' },
        'lumpy disease': { name: 'Lumpy Skin Disease', icon: 'fa-bacteria', urgency: 'HIGH', color: '#ea580c', desc: 'Viral dermatosis. Quarantine & vector control advised.' },
        'mastitis': { name: 'Mastitis', icon: 'fa-droplet', urgency: 'MODERATE', color: '#ca8a04', desc: 'Mammary inflammation. Antibiotic therapy recommended.' },
        'normal': { name: 'Healthy', icon: 'fa-shield-heart', urgency: 'NORMAL', color: '#16a34a', desc: 'No pathological signs. Routine monitoring suffices.' }
    };

    let activeStream = null;
    let camMode = false;
    let currentResult = null;

    // DOM elements
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const galleryBtn = document.getElementById('galleryBtn');
    const cameraBtn = document.getElementById('cameraBtn');
    const clearBtn = document.getElementById('clearBtn');
    const previewImg = document.getElementById('previewImg');
    const placeholderDiv = document.getElementById('placeholder');
    const loaderOverlay = document.getElementById('loaderOverlay');
    const scanStatusSpan = document.getElementById('scanStatus');
    const resultsContainer = document.getElementById('resultsList');
    const video = document.getElementById('cameraStream');
    const captureCanvas = document.getElementById('captureCanvas');
    const pdfBtn = document.getElementById('pdfBtn');
    const themeToggle = document.getElementById('themeToggle');
    const cameraControls = document.getElementById('cameraControls');
    const captureBtn = document.getElementById('captureBtn');
    const closeCamBtn = document.getElementById('closeCamBtn');

    // ----- ENHANCED COW LOGO (clear, professional, visible) -----
    function drawCowLogo(ctx, size) {
        const center = size / 2;
        const scale = size / 200;  // base 200px coordinate system
        
        ctx.save();
        ctx.scale(scale, scale);
        
        // Main face (rounded shape)
        ctx.beginPath();
        ctx.ellipse(100, 110, 55, 50, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.strokeStyle = '#cbd5e1';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        
        // Left ear
        ctx.beginPath();
        ctx.ellipse(55, 70, 18, 22, -0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        
        // Right ear
        ctx.beginPath();
        ctx.ellipse(145, 70, 18, 22, 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        
        // Horns
        ctx.beginPath();
        ctx.moveTo(48, 52);
        ctx.quadraticCurveTo(35, 25, 55, 22);
        ctx.quadraticCurveTo(68, 38, 62, 50);
        ctx.fillStyle = '#e2e8f0';
        ctx.fill();
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(152, 52);
        ctx.quadraticCurveTo(165, 25, 145, 22);
        ctx.quadraticCurveTo(132, 38, 138, 50);
        ctx.fill();
        ctx.stroke();
        
        // Eyes
        ctx.fillStyle = '#1e293b';
        ctx.beginPath();
        ctx.arc(82, 100, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(118, 100, 7, 0, Math.PI * 2);
        ctx.fill();
        
        // Eye highlights
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(79, 96, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(115, 96, 2, 0, Math.PI * 2);
        ctx.fill();
        
        // Snout area
        ctx.fillStyle = '#f8fafc';
        ctx.beginPath();
        ctx.ellipse(100, 132, 28, 22, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        
        // Nostrils
        ctx.fillStyle = '#475569';
        ctx.beginPath();
        ctx.arc(90, 132, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(110, 132, 4, 0, Math.PI * 2);
        ctx.fill();
        
        // Mouth (gentle smile)
        ctx.beginPath();
        ctx.arc(100, 148, 18, 0.1, Math.PI - 0.1);
        ctx.strokeStyle = '#475569';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Spots for character
        ctx.fillStyle = '#cbd5e1';
        ctx.beginPath();
        ctx.ellipse(68, 84, 8, 10, -0.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(132, 84, 8, 10, 0.2, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();
    }

    function generateCowLogoDataUrl(size = 80) {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        // Background gradient circle for badge effect
        const grad = ctx.createLinearGradient(0, 0, size, size);
        grad.addColorStop(0, '#1e6f5c');
        grad.addColorStop(1, '#0f4a3e');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
        ctx.fill();
        // Draw cow on top
        drawCowLogo(ctx, size);
        return canvas.toDataURL('image/png');
    }

    // Set the logo image
    const cowLogoUrl = generateCowLogoDataUrl(80);
    document.getElementById('logoImg').src = cowLogoUrl;
    
    // Also set favicon and apple touch icon for PWA feel
    let favicon = document.querySelector("link[rel*='icon']");
    if (!favicon) {
        favicon = document.createElement('link');
        favicon.rel = 'icon';
        document.head.appendChild(favicon);
    }
    favicon.href = cowLogoUrl;
    
    let appleIcon = document.querySelector("link[rel='apple-touch-icon']");
    if (!appleIcon) {
        appleIcon = document.createElement('link');
        appleIcon.rel = 'apple-touch-icon';
        document.head.appendChild(appleIcon);
    }
    appleIcon.href = cowLogoUrl;

    // ----- Mock AI Analysis (simulates clinical diagnosis) -----
    async function runAnalysis(file, imageDataUrl) {
        return new Promise((resolve) => {
            setTimeout(async () => {
                let seed = (file.size % 73) + (file.lastModified % 61);
                const img = new Image();
                img.src = imageDataUrl;
                await new Promise(r => { img.onload = r; });
                const canvas = document.createElement('canvas');
                canvas.width = 24; canvas.height = 24;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, 24, 24);
                const data = ctx.getImageData(0, 0, 24, 24).data;
                let sum = 0;
                for (let i = 0; i < data.length; i += 12) sum += data[i];
                seed = (seed + sum) % 100;
                let probs = {};
                const r = seed / 100;
                if (r < 0.4) { probs = { normal: 72 + (seed%15), FMD: 8, 'lumpy disease': 10, mastitis: 10 }; }
                else if (r < 0.6) { probs = { FMD: 68 + (seed%12), 'lumpy disease': 12, mastitis: 10, normal: 10 }; }
                else if (r < 0.8) { probs = { 'lumpy disease': 74 + (seed%14), FMD: 9, mastitis: 9, normal: 8 }; }
                else { probs = { mastitis: 71 + (seed%16), normal: 10, FMD: 9, 'lumpy disease': 10 }; }
                let total = Object.values(probs).reduce((a,b)=>a+b,0);
                for (let k of Object.keys(probs)) probs[k] = parseFloat((probs[k] / total * 100).toFixed(1));
                const sorted = Object.entries(probs).sort((a,b)=>b[1]-a[1]);
                resolve({ probabilities: probs, top: sorted[0][0], confidence: sorted[0][1] });
            }, 1100);
        });
    }

    async function performDiagnosis(file, dataUrl) {
        loaderOverlay.classList.add('active');
        let dots = 0;
        const interval = setInterval(() => {
            dots = (dots % 3) + 1;
            scanStatusSpan.innerText = 'AI Analysis' + '.'.repeat(dots);
        }, 400);
        try {
            const result = await runAnalysis(file, dataUrl);
            currentResult = result;
            renderDiagnosis(result.probabilities);
            return result;
        } catch (err) {
            alert('Analysis error');
        } finally {
            clearInterval(interval);
            loaderOverlay.classList.remove('active');
        }
    }

    function renderDiagnosis(probs) {
        const sorted = Object.entries(probs).sort((a,b)=>b[1]-a[1]);
        let html = '';
        for (let [key, val] of sorted) {
            const disease = DISEASE_DB[key] || DISEASE_DB.normal;
            const isTop = sorted[0][0] === key;
            html += `
                <div class="result-item ${isTop ? 'top' : ''}">
                    <div class="result-row">
                        <div class="disease"><i class="fas ${disease.icon}"></i> ${disease.name}</div>
                        <div class="confidence">${val.toFixed(1)}%</div>
                    </div>
                    <div class="progress"><div class="progress-fill" data-w="${val}%"></div></div>
                    <div><span class="urgency" style="color:${disease.color}; background:${disease.color}10;"><i class="fas fa-exclamation-triangle"></i> ${disease.urgency}</span></div>
                    <div class="desc"><i class="fas fa-notes-medical"></i> ${disease.desc}</div>
                </div>
            `;
        }
        resultsContainer.innerHTML = html;
        setTimeout(() => document.querySelectorAll('.progress-fill').forEach(p => p.style.width = p.dataset.w), 30);
    }

    function resetToEmpty() {
        const empty = { 'FMD': 0, 'lumpy disease': 0, 'mastitis': 0, 'normal': 0 };
        renderDiagnosis(empty);
        currentResult = null;
    }

    function stopCamera() {
        if (activeStream) {
            activeStream.getTracks().forEach(t => t.stop());
            activeStream = null;
        }
        video.style.display = 'none';
        camMode = false;
        cameraControls.style.display = 'none';
    }

    function startCameraMode() {
        if (camMode) stopCamera();
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then(stream => {
                activeStream = stream;
                video.srcObject = stream;
                video.style.display = 'block';
                camMode = true;
                cameraControls.style.display = 'flex';
                placeholderDiv.style.display = 'none';
                previewImg.classList.remove('active');
            })
            .catch(() => alert('Camera access needed for live capture'));
    }

    function captureAndAnalyze() {
        if (!activeStream) return;
        const ctx = captureCanvas.getContext('2d');
        captureCanvas.width = video.videoWidth;
        captureCanvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        captureCanvas.toBlob(blob => {
            const file = new File([blob], 'snapshot.jpg', { type: 'image/jpeg' });
            const reader = new FileReader();
            reader.onload = e => {
                const url = e.target.result;
                previewImg.src = url;
                previewImg.classList.add('active');
                placeholderDiv.style.display = 'none';
                stopCamera();
                performDiagnosis(file, url);
            };
            reader.readAsDataURL(file);
        }, 'image/jpeg', 0.85);
    }

    function handleImageUpload(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = e => {
            const url = e.target.result;
            previewImg.src = url;
            previewImg.classList.add('active');
            placeholderDiv.style.display = 'none';
            if (camMode) stopCamera();
            performDiagnosis(file, url);
        };
        reader.readAsDataURL(file);
    }

    // ---- Event Listeners ----
    galleryBtn.addEventListener('click', () => {
        if (camMode) stopCamera();
        fileInput.click();
    });
    fileInput.addEventListener('change', e => {
        if (e.target.files && e.target.files[0]) handleImageUpload(e.target.files[0]);
    });
    cameraBtn.addEventListener('click', startCameraMode);
    captureBtn.addEventListener('click', captureAndAnalyze);
    closeCamBtn.addEventListener('click', stopCamera);
    clearBtn.addEventListener('click', () => {
        stopCamera();
        previewImg.classList.remove('active');
        placeholderDiv.style.display = 'flex';
        previewImg.src = '';
        fileInput.value = '';
        resetToEmpty();
        currentResult = null;
    });
    uploadZone.addEventListener('dragover', e => e.preventDefault());
    uploadZone.addEventListener('drop', e => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) handleImageUpload(file);
    });
    pdfBtn.addEventListener('click', () => {
        if (!currentResult) { alert('No active analysis to export'); return; }
        const win = window.open('', '_blank');
        let content = `<html><head><title>VetScan Report</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet"><style>body{font-family:Inter;padding:20px;background:#fff} .item{border:1px solid #ddd;border-radius:12px;padding:12px;margin:8px 0}</style></head><body><h3>🐄 Clinical Report</h3>`;
        const sorted = Object.entries(currentResult.probabilities).sort((a,b)=>b[1]-a[1]);
        for (let [key, val] of sorted) {
            const d = DISEASE_DB[key];
            content += `<div class="item"><strong>${d.name}</strong> — ${val.toFixed(1)}%<br/><small>${d.desc}</small><br/><span>Urgency: ${d.urgency}</span></div>`;
        }
        content += `<p style="font-size:0.7rem; margin-top:20px;">Generated ${new Date().toLocaleString()} · VetScan AI (No data stored)</p></body></html>`;
        win.document.write(content);
        win.document.close();
        win.print();
    });
    themeToggle.addEventListener('click', () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (isDark) document.documentElement.removeAttribute('data-theme');
        else document.documentElement.setAttribute('data-theme', 'dark');
    });

    // Initialize empty results
    resetToEmpty();
</script>
</body>
</html>
